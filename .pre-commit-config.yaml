repos:
  - repo: local
    hooks:
      - id: ruff_check
        name: ruff check
        language: system
        entry: ruff check
        exclude:
          glob:
            - "libraries/**/*.*"
        files:
          glob:
            - "source/**/*.py"
      - id: ruff_format
        name: ruff format
        language: system
        entry: ruff format --check
        exclude:
          glob:
            - "libraries/**/*.*"
        files:
          glob:
            - "source/**/*.py"
      - id: tombi
        name: tombi
        language: system
        entry: tombi format --check
        exclude:
          glob:
            - ".github/**/*.*"
            - "libraries/**/*.*"
        files:
          glob:
            - "**/*.toml"
      - id: docs
        name: docs
        language: system
        entry: rumdl check
        exclude:
          glob:
            - ".github/**/*.*"
            - "libraries/**/*.*"
        files:
          glob:
            - "**/*.md"
